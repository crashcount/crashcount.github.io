name: Sync Issue Labels

on:
  push:
    branches: [main]
    paths:
      - '.github/labels.json'
      - '.github/workflows/sync_issue_labels.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync labels from repo config
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const desiredLabels = JSON.parse(
              fs.readFileSync('.github/labels.json', 'utf8')
            );

            const { owner, repo } = context.repo;
            const existingLabels = await github.paginate(
              github.rest.issues.listLabelsForRepo,
              {
                owner,
                repo,
                per_page: 100,
              }
            );

            const existingByName = new Map(
              existingLabels.map((label) => [label.name, label])
            );

            for (const label of desiredLabels) {
              const current = existingByName.get(label.name);

              if (!current) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  ...label,
                });
                console.log(`Created label: ${label.name}`);
                continue;
              }

              const currentDescription = current.description || '';
              const desiredDescription = label.description || '';
              const colorChanged =
                current.color.toLowerCase() !== label.color.toLowerCase();
              const descriptionChanged =
                currentDescription !== desiredDescription;

              if (!colorChanged && !descriptionChanged) {
                console.log(`Label already up to date: ${label.name}`);
                continue;
              }

              await github.rest.issues.updateLabel({
                owner,
                repo,
                name: current.name,
                color: label.color,
                description: label.description,
              });
              console.log(`Updated label: ${label.name}`);
            }
