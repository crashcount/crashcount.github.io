name: Crashcount app bug report
description: Report a bug in the Crashcount iPhone beta or release app.
title: "[Crashcount app bug]: "
labels:
  - bug
  - beta
  - ready-for-codex
  - crashcount-app
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping test Crashcount.

        Please use simple language. Short answers are fine.

        This creates a public GitHub issue. Do not include private information, exact home or work addresses, or anything you would not want posted publicly. If you need a private channel instead, email hello@crashcount.nyc.

  - type: dropdown
    id: build-channel
    attributes:
      label: Where did this happen?
      description: Pick the version you were using when the bug happened.
      options:
        - TestFlight beta
        - App Store release
        - I'm not sure
    validations:
      required: true

  - type: dropdown
    id: feature-area
    attributes:
      label: What part of the app were you using?
      options:
        - Nearby
        - Find or map
        - Crashscape AR
        - Articles or district pages
        - Location, camera, or permissions
        - Something else
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What went wrong?
      description: Tell us what you saw in plain language.
      placeholder: The app froze when I opened Nearby and tapped the map.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: I expected the map to open and let me move around.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Can you make it happen again?
      description: If yes, list the steps. If not, tell us what you did right before it happened.
      placeholder: |
        1. Open the app
        2. Tap Nearby
        3. Tap the map
        4. The app freezes
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: How often does this happen?
      options:
        - Every time
        - Sometimes
        - Just once so far
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: How much did this affect you?
      options:
        - Blocked me completely
        - Major problem, but I could keep going
        - Minor problem
        - Visual glitch only
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: What device were you using?
      description: Simple answers are fine.
      placeholder: iPhone 15 Pro, iPhone 13, or iPad
    validations:
      required: true

  - type: input
    id: ios-version
    attributes:
      label: iOS version (if you know it)
      placeholder: iOS 18.4.1

  - type: input
    id: app-version
    attributes:
      label: App version or build number (if you can find it)
      placeholder: 1.0 (42)

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshot or screen recording notes
      description: You can drag screenshots into this box if that is easier.
      placeholder: I attached two screenshots showing the error message.

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed private or personal information before submitting this public report.
          required: true
