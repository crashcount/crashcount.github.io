<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="0; url=https://crashcount.nyc/">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crashcount Feedback</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --ink: #17202a;
        --accent: #cb5a2e;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(203, 90, 46, 0.15), transparent 35%),
          linear-gradient(180deg, #fcfaf5 0%, var(--bg) 100%);
        color: var(--ink);
        font-family: Georgia, "Times New Roman", serif;
      }

      main {
        width: min(40rem, calc(100vw - 3rem));
        padding: 2rem;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(2rem, 5vw, 3.5rem);
      }

      p {
        font-size: 1.05rem;
        line-height: 1.6;
      }

      a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Crashcount</h1>
      <p>
        This legacy site now redirects to
        <a href="https://crashcount.nyc/">crashcount.nyc</a>.
      </p>
      <p>
        To report a bug, use the public GitHub issue forms in the
        <a href="https://github.com/crashcount/crashcount.github.io/issues/new/choose">feedback repo</a>.
      </p>
    </main>
  </body>
</html>
